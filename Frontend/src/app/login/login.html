<div class="login-container">
    <h2>Login</h2>
    
    <div *ngIf="loginError" class="error-message" style="color: red; margin-bottom: 15px; padding: 10px; border: 1px solid red; border-radius: 4px;">
        {{ loginError }}
    </div>
    
    <form (ngSubmit)="onSubmit()" #loginForm="ngForm">
        <div>
            <label for="username">Username (email):</label>
            <input type="text" id="username" name="username" [(ngModel)]="loginData.username" placeholder="Enter your email" required>
        </div>
        <div>
            <label for="password">Password:</label>
            <input type="password" id="password" name="password" [(ngModel)]="loginData.password" placeholder="Enter your password" required>
        </div>
        <button type="submit" class="btn btn-primary" [disabled]="isLoading">
            {{ isLoading ? 'Logging in...' : 'Login' }}
        </button>
    </form>
</div>
