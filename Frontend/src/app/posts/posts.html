<app-sidebar></app-sidebar>

<div class="posts-container">
    <div class="posts-header">
        <h1>Blog Posts</h1>
        <button class="btn btn-primary create-post-btn" routerLink="/create-post">Create New Post</button>
    </div>

    <div *ngIf="loading" class="loading">
        Loading posts...
    </div>

    <div *ngIf="error" class="error">
        {{ error }}
    </div>
    <div *ngIf="!loading && posts.length>0" class="posts-list">
        <article *ngFor="let post of posts" class="post-card">
            <h2>{{ post.description }}</h2>
            <div class="post-meta">
                <span class="author">By: {{ post.users.name }}</span>
                <span class="date">{{ post.timestamp | date:'short' }}</span>
            </div>
        </article>
    </div>

    <div *ngIf="!loading && posts.length==0" class="no-posts">
        No posts yet.
    </div>
</div>
