<app-sidebar>
  <div class="profile-container">
    <div class="profile-header">
      <h1>My Profile</h1>
      <button class="btn btn-outline-danger logout-btn" (click)="logout()">Logout</button>
    </div>

    <div *ngIf="isLoading" class="loading">
      Loading profile...
    </div>

    <div *ngIf="!isLoading && user" class="profile-content">
      <!-- Tab Navigation -->
      <div class="tabs">
        <button
          class="tab-btn"
          [class.active]="activeTab === 'details'"
          (click)="setActiveTab('details')">
          Personal Details
        </button>
        <button
          class="tab-btn"
          [class.active]="activeTab === 'posts'"
          (click)="setActiveTab('posts')">
          My Posts ({{ userPosts.length }})
        </button>
      </div>

      <!-- Personal Details Tab -->
      <div *ngIf="activeTab === 'details'" class="tab-content">
        <div class="profile-card">
          <div class="profile-avatar">
            <div class="avatar-placeholder">
              {{ user.name.charAt(0).toUpperCase() }}
            </div>
          </div>

          <div *ngIf="!isEditing" class="profile-info">
            <h2>{{ user.name }}</h2>
            <p class="email">{{ user.email }}</p>
            <button class="btn btn-primary" (click)="toggleEdit()">Edit Profile</button>
          </div>

          <div *ngIf="isEditing" class="edit-form">
            <h2>Edit Profile</h2>
            <form (ngSubmit)="saveProfile()">
              <div class="form-group">
                <label for="name">Name:</label>
                <input
                  type="text"
                  id="name"
                  [(ngModel)]="editForm.name"
                  name="name"
                  required>
              </div>
              <div class="form-group">
                <label for="email">Email:</label>
                <input
                  type="email"
                  id="email"
                  [(ngModel)]="editForm.email"
                  name="email"
                  required>
              </div>
              <div class="form-actions">
                <button type="submit" class="btn btn-success" [disabled]="isLoading">
                  {{ isLoading ? 'Saving...' : 'Save Changes' }}
                </button>
                <button type="button" class="btn btn-secondary" (click)="toggleEdit()">Cancel</button>
              </div>
            </form>
          </div>
        </div>
      </div>

      <!-- Posts Tab -->
      <div *ngIf="activeTab === 'posts'" class="tab-content">
        <div class="posts-section">
          <h2>My Posts</h2>
          <div *ngIf="userPosts.length === 0" class="no-posts">
            <p>You haven't created any posts yet.</p>
            <button class="btn btn-primary" routerLink="/create-post">Create Your First Post</button>
          </div>
          <div *ngIf="userPosts.length > 0" class="user-posts-list">
            <div *ngFor="let post of userPosts" class="user-post-card">
              <h3>{{ post.description }}</h3>
              <p class="post-date">{{ post.timestamp | date:'medium' }}</p>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
</app-sidebar>
